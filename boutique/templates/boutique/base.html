<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WARIOP | E-commerce 🇨🇮{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen flex flex-col antialiased">

    <nav class="bg-white border-b-4 border-orange-500 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0">
                    <a href="{% url 'liste_produits' %}" class="flex items-center gap-2">
                        <!-- 🔥 CORRECTION ICI : Chemin du logo -->
                        <img src="{% static 'boutique/images/wariop_logo.png' %}" alt="Logo WARIOP" class="w-12 h-12 object-contain">
                        <span class="text-2xl font-black text-zinc-900">WARIOP<span class="text-emerald-600">.</span></span>
                    </a>
                </div>
                <!-- Ajoute ici le reste de ta navbar (panier, connexion, etc.) -->
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-10 w-full">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-zinc-900 text-stone-400 text-center py-8 text-sm mt-auto">
        &copy; 2026 WARIOP. Fait avec passion en Côte d'Ivoire 🇨🇮.
    </footer>
</body>
</html>
