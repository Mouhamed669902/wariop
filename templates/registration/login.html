<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | WARIOP</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">
        <div class="text-center mb-6">
            <a href="/" class="flex items-center justify-center gap-2">
                <img src="{% static 'boutique/images/wariop_logo.png' %}" alt="Logo WARIOP" class="w-12 h-12 object-contain">
                <span class="text-2xl font-black text-zinc-900">WARIOP<span class="text-emerald-600">.</span></span>
            </a>
        </div>

        <h2 class="text-2xl font-bold text-zinc-900 mb-6 text-center">🔐 Connexion</h2>

        <form method="post">
            {% csrf_token %}

            <div class="mb-4">
                <label class="block text-sm font-medium text-stone-700 mb-1">Nom d'utilisateur</label>
                <input type="text" name="username" class="w-full px-4 py-2 border border-stone-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Votre nom d'utilisateur" required>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-stone-700 mb-1">Mot de passe</label>
                <input type="password" name="password" class="w-full px-4 py-2 border border-stone-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Votre mot de passe" required>
            </div>

            {% if form.errors %}
                <div class="bg-red-50 text-red-500 p-3 rounded-xl text-sm mb-4">
                    ❌ Nom d'utilisateur ou mot de passe incorrect.
                </div>
            {% endif %}

            <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition">
                Se connecter
            </button>
        </form>

        <p class="text-center text-stone-500 text-sm mt-4">
            Pas encore de compte ? <a href="{% url 'inscription_vendeur' %}" class="text-emerald-600 font-semibold hover:underline">Devenir vendeur</a>
        </p>
    </div>

</body>
</html>
